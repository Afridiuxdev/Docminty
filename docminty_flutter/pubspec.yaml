name: docminty
description: DocMinty - GST Document Generator for Indian Businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.4

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3

  # Image Handling
  image_picker: ^1.1.1
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.1

  # Signature Pad
  syncfusion_flutter_signaturepad: ^25.1.41

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.1.1

  # PDF Reading & Rendering
  pdfx: ^2.6.0

  # Razorpay Payment
  razorpay_flutter: ^1.3.6

  # Google Sign-In
  google_sign_in: ^6.2.1

  # UI Utilities
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  intl: 0.20.2
  timeago: ^3.6.1

  # Local Storage
  shared_preferences: ^2.2.3

  # JSON Serialization
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  dartz: ^0.10.1

  # Share & File
  share_plus: 12.0.2
  file_picker: ^8.0.3

  # Form Validation
  reactive_forms: ^17.0.1

  # Icons
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
